apiVersion: v1
kind: Service
metadata:
  name: prometheus
  labels:
    app: prometheus
spec:
  type: NodePort
  selector:
    app: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: 9090
      protocol: TCP
      nodePort: 30900
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
          ports:
            - containerPort: 9090
              name: http
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus/prometheus.yml
              readOnly: true
            - name: alerts
              mountPath: /etc/prometheus/alerts.yml
              readOnly: true
            - name: vault-cert
              mountPath: /etc/prometheus/certs/vault.crt
              readOnly: true
            - name: data
              mountPath: /prometheus
      volumes:
        - name: config
          hostPath:
            path: /Users/taolong/Workspaces/influx_db/kubernetes/prometheus/prometheus.yml
            type: File
        - name: alerts
          hostPath:
            path: /Users/taolong/Workspaces/influx_db/kubernetes/prometheus/alerts.yml
            type: File
        - name: vault-cert
          hostPath:
            path: /Users/taolong/Workspaces/influx_db/kubernetes/prometheus/certs/vault.crt
            type: File
        - name: data
          emptyDir: {}
