apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: telegraf-mqtt
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: SecretStore
  target:
    name: telegraf-mqtt
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: telegraf/mqtt
        property: username
    - secretKey: password
      remoteRef:
        key: telegraf/mqtt
        property: password
