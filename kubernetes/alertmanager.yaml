apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  labels:
    app: alertmanager
spec:
  type: NodePort
  selector:
    app: alertmanager
  ports:
    - name: http
      port: 9093
      targetPort: 9093
      protocol: TCP
      nodePort: 30903
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: alertmanager
  labels:
    app: alertmanager
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-vault-agent
  labels:
    app: alertmanager
data:
  agent.hcl: |
    pid_file = "/tmp/vault-agent.pid"

    auto_auth {
      method "kubernetes" {
        mount_path = "auth/kubernetes"
        config = {
          role = "alertmanager"
        }
      }

      sink "file" {
        config = {
          path = "/vault/token/vault-token"
        }
      }
    }

    template {
      source      = "/vault/templates/alertmanager.yml.tmpl"
      destination = "/out/alertmanager.yml"
      perms       = "0644"
    }
  alertmanager.yml.tmpl: |
    global:
      resolve_timeout: 5m
      slack_api_url: '{{ with secret "kv/data/slack" }}{{ .Data.data.api_url }}{{ end }}'

    route:
      receiver: slack_alerts
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 1h

    receivers:
    - name: slack_alerts
      slack_configs:
        - channel: "#hemlock"
          send_resolved: true
          title: "{{`{{`}} .CommonLabels.alertname {{`}}`}}"
          text: |
            *Alert:* {{`{{`}} .CommonLabels.alertname {{`}}`}}
            *Severity:* {{`{{`}} .CommonLabels.severity {{`}}`}}
            *Instance:* {{`{{`}} .CommonLabels.instance {{`}}`}}
            {{`{{`}} range .Alerts -{{`}}`}}
            *Description:* {{`{{`}} .Annotations.description {{`}}`}}
            {{`{{`}} end {{`}}`}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  labels:
    app: alertmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      serviceAccountName: alertmanager
      containers:
        - name: alertmanager
          image: prom/alertmanager:latest
          args:
            - --config.file=/out/alertmanager.yml
          ports:
            - containerPort: 9093
              name: http
          volumeMounts:
            - name: shared-out
              mountPath: /out
        - name: vault-agent
          image: hashicorp/vault:1.21
          imagePullPolicy: IfNotPresent
          args:
            - agent
            - -config=/vault/agent.hcl
          env:
            - name: VAULT_ADDR
              value: https://vault:4981
            - name: VAULT_CACERT
              value: /vault/certs/vault.crt
          volumeMounts:
            - name: vault-agent-config
              mountPath: /vault/agent.hcl
              subPath: agent.hcl
              readOnly: true
            - name: vault-agent-config
              mountPath: /vault/templates/alertmanager.yml.tmpl
              subPath: alertmanager.yml.tmpl
              readOnly: true
            - name: vault-ca
              mountPath: /vault/certs/vault.crt
              subPath: vault.crt
              readOnly: true
            - name: vault-token
              mountPath: /vault/token
            - name: shared-out
              mountPath: /out
      volumes:
        - name: vault-agent-config
          configMap:
            name: alertmanager-vault-agent
        - name: vault-ca
          secret:
            secretName: vault-ca
        - name: vault-token
          emptyDir: {}
        - name: shared-out
          emptyDir: {}
